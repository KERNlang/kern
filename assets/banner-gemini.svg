<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .base { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .grid { stroke: #21262d; stroke-width: 1; }
    .title { fill: #ffffff; font-weight: 800; font-size: 56px; letter-spacing: -3px; }
    .tagline { fill: #8b949e; font-size: 14px; font-weight: 400; letter-spacing: 1.5px; text-transform: uppercase; }
    .stat { fill: #3fb950; font-weight: 700; font-size: 15px; letter-spacing: 0.5px; }
    .kern-node { fill: #ffffff; }
    .target-text { fill: #c9d1d9; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .connector { stroke: #30363d; stroke-width: 1; fill: none; stroke-dasharray: 400; stroke-dashoffset: 400; animation: draw 4s infinite ease-in-out; }
    .node-pulse { fill: none; stroke: #ffffff; stroke-width: 1; opacity: 0; animation: pulse 2s infinite; }
    
    @keyframes draw { 
      0%, 15% { stroke-dashoffset: 400; opacity: 0; }
      45%, 55% { stroke-dashoffset: 0; opacity: 1; }
      85%, 100% { stroke-dashoffset: 0; opacity: 0; }
    }
    @keyframes pulse {
      0% { r: 4; opacity: 0.8; }
      100% { r: 24; opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .floating { animation: float 3s infinite ease-in-out; }
    .d1 { animation-delay: 0.0s; }
    .d2 { animation-delay: 0.2s; }
    .d3 { animation-delay: 0.4s; }
    .d4 { animation-delay: 0.6s; }
    .d5 { animation-delay: 0.8s; }
    .d6 { animation-delay: 1.0s; }
    .d7 { animation-delay: 1.2s; }
  </style>

  <rect width="800" height="200" fill="#0d1117" />
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid" />
    </pattern>
  </defs>
  <rect width="800" height="200" fill="url(#grid)" />
  
  <g class="base" transform="translate(400, 100)">
    <g transform="translate(0, -15)">
      <text text-anchor="middle" class="title">KERN</text>
      <text y="24" text-anchor="middle" class="tagline">The language LLMs think in</text>
      <text y="46" text-anchor="middle" class="stat">70% FEWER TOKENS</text>
    </g>

    <g transform="translate(0, 65)">
      <circle class="node-pulse" r="4" />
      <circle class="kern-node" r="5" />
      <text y="22" text-anchor="middle" class="target-text" style="fill:#fff; font-size:11px;">index.kern</text>

      <g class="floating d1"><path class="connector d1" d="M 0 0 L -310 -55" /><circle cx="-310" cy="-55" r="3.5" fill="#61dafb" /><text x="-310" y="-72" text-anchor="middle" class="target-text">React</text></g>
      <g class="floating d2"><path class="connector d2" d="M 0 0 L -210 -85" /><circle cx="-210" cy="-85" r="3.5" fill="#ffffff" /><text x="-210" y="-102" text-anchor="middle" class="target-text">Next.js</text></g>
      <g class="floating d3"><path class="connector d3" d="M 0 0 L -105 -105" /><circle cx="-105" cy="-105" r="3.5" fill="#38bdf8" /><text x="-105" y="-122" text-anchor="middle" class="target-text">Tailwind</text></g>
      <g class="floating d4"><path class="connector d4" d="M 0 0 L 0 -115" /><circle cx="0" cy="-115" r="3.5" fill="#61dafb" /><text x="0" y="-132" text-anchor="middle" class="target-text">React Native</text></g>
      <g class="floating d5"><path class="connector d5" d="M 0 0 L 105 -105" /><circle cx="105" cy="-105" r="3.5" fill="#4ade80" /><text x="105" y="-122" text-anchor="middle" class="target-text">Express</text></g>
      <g class="floating d6"><path class="connector d6" d="M 0 0 L 210 -85" /><circle cx="210" cy="-85" r="3.5" fill="#facc15" /><text x="210" y="-102" text-anchor="middle" class="target-text">CLI</text></g>
      <g class="floating d7"><path class="connector d7" d="M 0 0 L 310 -55" /><circle cx="310" cy="-55" r="3.5" fill="#ffffff" /><text x="310" y="-72" text-anchor="middle" class="target-text">Terminal</text></g>
    </g>
  </g>
</svg>
