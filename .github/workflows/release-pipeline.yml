name: Release Pipeline

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string
      publish:
        description: Publish packages and sync versions back to dev
        required: true
        type: boolean

jobs:
  release:
    name: ${{ inputs.publish && 'Publish to npm' || 'Release Preflight' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          pnpm --version

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python MCP SDK (for transpiler E2E tests)
        run: pip install mcp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package versions
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          tmp=$(mktemp)
          jq --arg v "$RELEASE_VERSION" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

          for pkg in packages/*/package.json; do
            tmp=$(mktemp)
            jq --arg v "$RELEASE_VERSION" '.version = $v' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done

          # Keep KERN_VERSION in lockstep with root package.json so the @generated
          # header in compiled output is truthful. Enforced by check-repo-consistency.mjs.
          # Must happen BEFORE the build below so dist/ carries the correct stamp.
          spec=packages/core/src/spec.ts
          tmp=$(mktemp)
          awk -v v="$RELEASE_VERSION" '{
            if ($0 ~ /^export const KERN_VERSION = /) {
              print "export const KERN_VERSION = '\''" v "'\'';"
            } else {
              print
            }
          }' "$spec" > "$tmp"
          mv "$tmp" "$spec"

      - name: Check repo consistency
        run: npm run check:repo

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish dry run
        if: ${{ inputs.publish }}
        run: pnpm -r publish --dry-run --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages
        if: ${{ inputs.publish }}
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published packages on npm
        if: ${{ inputs.publish }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$RELEASE_VERSION"

          for pkg in packages/*/package.json; do
            NAME=$(jq -r '.name' "$pkg")
            PRIVATE=$(jq -r '.private // false' "$pkg")

            if [ "$PRIVATE" = "true" ]; then
              continue
            fi

            ENCODED_NAME=$(node -p "encodeURIComponent(process.argv[1])" "$NAME")
            PUBLISHED=false

            for attempt in 1 2 3 4 5 6; do
              if curl -fsS "https://registry.npmjs.org/$ENCODED_NAME/$VERSION" > /dev/null; then
                PUBLISHED=true
                break
              fi
              sleep 10
            done

            if [ "$PUBLISHED" != "true" ]; then
              echo "::error::Package $NAME@$VERSION is not available from the npm registry after publish"
              exit 1
            fi
          done

      - name: Publish dry run
        if: ${{ !inputs.publish }}
        run: pnpm -r publish --dry-run --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync versions back to dev
        if: ${{ inputs.publish }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout dev
          git pull origin dev

          tmp=$(mktemp)
          jq --arg v "$RELEASE_VERSION" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

          for pkg in packages/*/package.json; do
            tmp=$(mktemp)
            jq --arg v "$RELEASE_VERSION" '.version = $v' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done

          spec=packages/core/src/spec.ts
          tmp=$(mktemp)
          awk -v v="$RELEASE_VERSION" '{
            if ($0 ~ /^export const KERN_VERSION = /) {
              print "export const KERN_VERSION = '\''" v "'\'';"
            } else {
              print
            }
          }' "$spec" > "$tmp"
          mv "$tmp" "$spec"

          git add package.json packages/*/package.json packages/core/src/spec.ts
          git commit -m "chore: sync versions to v${RELEASE_VERSION} [skip ci]"
          git push origin dev
