name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry Run Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure workflow runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Run this workflow from the main branch"
            exit 1
          fi

      - name: Validate version input
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if ! printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be plain semver without a leading v, for example 3.2.3"
            exit 1
          fi
          echo "TAG=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          pnpm --version

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python MCP SDK (for transpiler E2E tests)
        run: pip install mcp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package versions
        run: |
          tmp=$(mktemp)
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

          for pkg in packages/*/package.json; do
            tmp=$(mktemp)
            jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish dry run
        run: pnpm -r publish --dry-run --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
