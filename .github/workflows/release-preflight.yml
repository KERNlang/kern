name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate preflight input
    runs-on: ubuntu-latest

    steps:
      - name: Ensure workflow runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Run this workflow from the main branch"
            exit 1
          fi

      - name: Validate version input
        run: |
          VERSION="${{ inputs.version }}"
          if ! printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be plain semver without a leading v, for example 3.2.3"
            exit 1
          fi

  preflight:
    name: Release preflight
    needs: validate
    uses: ./.github/workflows/release-pipeline.yml
    with:
      version: ${{ inputs.version }}
      publish: false
    secrets: inherit
