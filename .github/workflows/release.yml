name: Version & Publish

on:
  release:
    types: [published]

concurrency:
  group: kernlang-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Release tags must use lowercase v and semver, for example v3.2.3"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point to a commit contained in origin/main"
            exit 1
          fi

  publish:
    name: Publish to npm
    needs: validate
    uses: ./.github/workflows/release-pipeline.yml
    with:
      version: ${{ needs.validate.outputs.version }}
      publish: true
    secrets: inherit
