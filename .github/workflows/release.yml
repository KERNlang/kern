name: Version & Publish

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Release tags must use lowercase v and semver, for example v3.2.2"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point to a commit contained in origin/main"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package versions
        run: |
          # Root monorepo package
          tmp=$(mktemp)
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

          # All workspace packages
          for pkg in packages/*/package.json; do
            tmp=$(mktemp)
            jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish packages
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync versions back to dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout dev
          git pull origin dev

          # Apply same version bump to dev
          VERSION="${{ steps.version.outputs.VERSION }}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json
          for pkg in packages/*/package.json; do
            tmp=$(mktemp)
            jq --arg v "$VERSION" '.version = $v' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done

          git add package.json packages/*/package.json
          git commit -m "chore: sync versions to v${VERSION} [skip ci]" || echo "No version changes to commit"
          git push origin dev
