name: Canary Publish

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish under
        required: false
        default: canary
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish canary to npm
    if: ${{ github.repository == 'KERNlang/kern' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          pnpm --version

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python MCP SDK
        run: pip install mcp

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute canary version
        env:
          NPM_TAG_INPUT: ${{ github.event.inputs.npm_tag || 'canary' }}
        run: |
          BASE_VERSION=$(jq -r '.version' package.json)
          if ! printf '%s\n' "$BASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Root package version must be stable semver, got $BASE_VERSION"
            exit 1
          fi

          IFS=. read -r MAJOR MINOR PATCH <<EOF
          $BASE_VERSION
          EOF

          NEXT_PATCH=$((PATCH + 1))
          SHORT_SHA=$(printf '%s' "$GITHUB_SHA" | cut -c1-8)
          CANARY_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-canary.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}.${SHORT_SHA}"
          NPM_TAG="${NPM_TAG_INPUT:-canary}"

          if ! printf '%s\n' "$NPM_TAG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "::error::npm tag contains invalid characters: $NPM_TAG"
            exit 1
          fi

          echo "CANARY_VERSION=$CANARY_VERSION" >> "$GITHUB_ENV"
          echo "NPM_TAG=$NPM_TAG" >> "$GITHUB_ENV"
          echo "Canary version: $CANARY_VERSION"
          echo "npm dist-tag: $NPM_TAG"

      - name: Set package versions
        run: |
          tmp=$(mktemp)
          jq --arg v "$CANARY_VERSION" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

          for pkg in packages/*/package.json; do
            tmp=$(mktemp)
            jq --arg v "$CANARY_VERSION" '.version = $v' "$pkg" > "$tmp"
            mv "$tmp" "$pkg"
          done

          spec=packages/core/src/spec.ts
          tmp=$(mktemp)
          awk -v v="$CANARY_VERSION" '{
            if ($0 ~ /^export const KERN_VERSION = /) {
              print "export const KERN_VERSION = '\''" v "'\'';"
            } else {
              print
            }
          }' "$spec" > "$tmp"
          mv "$tmp" "$spec"

      - name: Check repo consistency
        run: npm run check:repo

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Native KERN Tests
        run: pnpm test:kern

      - name: Publish dry run
        run: pnpm -r publish --dry-run --no-git-checks --access public --tag "$NPM_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packages
        run: pnpm -r publish --no-git-checks --access public --tag "$NPM_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
