name: Bug Report
description: Report a bug in KERN
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: KERN version
      description: Output of `kern --version`
      placeholder: "3.1.6"
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@kernlang/cli"
        - "@kernlang/core"
        - "@kernlang/review"
        - "@kernlang/review-mcp"
        - "@kernlang/react"
        - "@kernlang/vue"
        - "@kernlang/express"
        - "@kernlang/fastapi"
        - "@kernlang/native"
        - "@kernlang/terminal"
        - "@kernlang/mcp"
        - "@kernlang/mcp-server"
        - "@kernlang/evolve"
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or .kern input to reproduce the issue.
      placeholder: |
        1. Create a .kern file with ...
        2. Run `kern compile ...`
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
